<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de EPI — SoldaForte Ltda.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
--azul:#0d6efd;
--cinza:#f4f6f8;
--verde:#28a745;
--vermelho:#dc3545;
--cinza-escuro:#6c757d;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--cinza);
}

/* LOGIN E CADASTRO */
#loginTela, #cadastroTela{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
background:var(--cinza);
}

/* ===== TELA INICIAL ===== */
#inicio{
height:100vh;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("img/fundo.jpg") center/cover no-repeat;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
width:180px;
margin-bottom:20px;
filter: drop-shadow(0 4px 10px rgba(0,0,0,.4));
}

#inicio button{
margin-top:25px;
padding:15px 45px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
font-weight:bold;
}

#funcionarios,#perfil{
display:none;
padding:30px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
padding:8px 16px;
border:none;
border-radius:6px;
background:var(--cinza-escuro);
color:white;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
margin-bottom:20px;
}

.lista li{
list-style:none;
padding:15px;
margin-bottom:10px;
background:white;
border-radius:8px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,.05);
transition:.2s;
}

.lista li:hover{transform:scale(1.02)}

.topo{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.topo img{
width:140px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:14px;
}

th{
background:var(--azul);
color:white;
}

.status-ok{color:var(--verde);font-weight:bold}
.status-vencido{color:var(--vermelho);font-weight:bold}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginTela">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email"><br><br>
<input id="loginSenha" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>
<p>Não tem conta? <span onclick="mostrarCadastro()" style="color:blue;cursor:pointer;">Cadastrar</span></p>
</div>

<!-- CADASTRO -->
<div id="cadastroTela">
<h2>Cadastro</h2>
<input id="cadEmail" placeholder="Email"><br><br>
<input id="cadSenha" type="password" placeholder="Senha"><br><br>
<select id="cadTipo">
<option value="viewer">Observador</option>
<option value="admin">Gerente</option>
</select><br><br>
<button onclick="cadastrar()">Cadastrar</button>
<p onclick="voltarLogin()" style="cursor:pointer;color:blue;">Voltar</p>
</div>

<!-- TELA INICIAL ORIGINAL -->
<div id="inicio">
<img src="img/logo.png" class="logo">
<h1>SoldaForte Ltda.</h1>
<h2>Controle de Equipamentos de Proteção Individual</h2>
<button onclick="entrar()">INICIAR</button>
</div>

<div id="funcionarios"></div>
<div id="perfil"></div>

<script>

window.onload = function(){
  document.getElementById("inicio").style.display = "none";
  document.getElementById("funcionarios").style.display = "none";
  document.getElementById("perfil").style.display = "none";
  document.getElementById("loginTela").style.display = "flex";
};

function mostrarCadastro(){
  loginTela.style.display="none";
  cadastroTela.style.display="flex";
}

function voltarLogin(){
  cadastroTela.style.display="none";
  loginTela.style.display="flex";
}

function cadastrar(){
  const email=cadEmail.value;
  const senha=cadSenha.value;
  const tipo=cadTipo.value;

  let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];
  usuarios.push({email,senha,tipo});
  localStorage.setItem("usuarios",JSON.stringify(usuarios));

  alert("Cadastrado com sucesso");
  voltarLogin();
}

function login(){
  const email=loginEmail.value;
  const senha=loginSenha.value;

  let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];
  const user=usuarios.find(u=>u.email===email && u.senha===senha);

  if(!user){alert("Login inválido");return;}

  localStorage.setItem("logado",JSON.stringify(user));
  entrarSistema(user);
}

function entrarSistema(user){
  loginTela.style.display="none";
  inicio.style.display="flex";
}

/* ===== FUNCIONÁRIOS ===== */
const funcionarios=[
{nome:"João Silva",cargo:"Soldador",cpf:"123.456.789-00",tel:"(31)98888-1111",email:"joao@soldaforte.com",adm:"2022-03-15",nasc:"1990-05-10",foto:"https://randomuser.me/api/portraits/men/1.jpg"},
{nome:"Maria Oliveira",cargo:"Técnica de Qualidade",cpf:"234.567.890-11",tel:"(31)97777-2222",email:"maria@soldaforte.com",adm:"2021-06-01",nasc:"1992-08-20",foto:"https://randomuser.me/api/portraits/women/2.jpg"},
{nome:"Carlos Pereira",cargo:"Engenheiro",cpf:"345.678.901-22",tel:"(31)96666-3333",email:"carlos@soldaforte.com",adm:"2020-01-10",nasc:"1988-02-18",foto:"https://randomuser.me/api/portraits/men/3.jpg"},
{nome:"Ana Santos",cargo:"Soldadora",cpf:"456.789.012-33",tel:"(31)95555-4444",email:"ana@soldaforte.com",adm:"2023-02-05",nasc:"1995-09-12",foto:"https://randomuser.me/api/portraits/women/4.jpg"}
];

/* ===== EPIs ===== */
const dados = [
{id:1,n:"João Silva",e:"Máscara de solda",f:"2025-08-01",t:"2026-01-28"},
{id:2,n:"João Silva",e:"Luvas de raspa",f:"2025-06-12",t:"2025-09-10"},
{id:3,n:"Maria Oliveira",e:"Óculos de proteção",f:"2025-02-10",t:"2025-08-09"},
{id:4,n:"Carlos Pereira",e:"Capacete",f:"2025-01-20",t:"2027-01-20"},
{id:5,n:"Ana Santos",e:"Máscara de solda",f:"2025-05-22",t:"2025-11-18"}
];

/* RESTO DO SEU CÓDIGO ORIGINAL CONTINUA NORMAL */

const inicio=document.getElementById("inicio");
const funcionariosTela=document.getElementById("funcionarios");
const perfilTela=document.getElementById("perfil");

function entrar(){inicio.style.display="none";mostrarFuncionarios();}
function voltarInicio(){perfilTela.style.display="none";funcionariosTela.style.display="none";inicio.style.display="flex";}
function voltarFuncionarios(){perfilTela.style.display="none";funcionariosTela.style.display="block";}

function diasRestantes(data){return Math.ceil((new Date(data)-new Date())/(1000*60*60*24));}
function status(data){return diasRestantes(data)<0?'<span class="status-vencido">Vencido</span>':'<span class="status-ok">Ativo</span>';}

function mostrarFuncionarios(){
funcionariosTela.innerHTML=`
<header>
<h2>Funcionários</h2>
<button class="btn" onclick="voltarInicio()">⬅ Voltar</button>
</header>
<ul class="lista">
${funcionarios.map(f=>`
<li onclick="abrirPerfil('${f.nome}')">
<strong>${f.nome}</strong><br>${f.cargo}
</li>
`).join("")}
</ul>`;
funcionariosTela.style.display="block";
}

function abrirPerfil(nome){
funcionariosTela.style.display="none";
const f=funcionarios.find(x=>x.nome===nome);
const lista=dados.filter(d=>d.n===nome);

perfilTela.innerHTML=`
<header>
<h2>${f.nome}</h2>
<button class="btn" onclick="voltarFuncionarios()">⬅ Voltar</button>
</header>

<div class="card topo">
<img src="${f.foto}">
<div>
<p><strong>Cargo:</strong> ${f.cargo}</p>
<p><strong>CPF:</strong> ${f.cpf}</p>
<p><strong>Telefone:</strong> ${f.tel}</p>
<p><strong>Email:</strong> ${f.email}</p>
<p><strong>Nascimento:</strong> ${f.nasc}</p>
<p><strong>Admissão:</strong> ${f.adm}</p>
<p><strong>Status:</strong> Ativo</p>
</div>
</div>

<div class="card">
<h3>EPIs Entregues</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>EPI</th>
<th>Data Entrega</th>
<th>Validade</th>
<th>Dias Restantes</th>
<th>Status</th>
</tr>
</thead>
<tbody>
${lista.map(e=>`
<tr>
<td>${e.id}</td>
<td>${e.e}</td>
<td>${e.f}</td>
<td>${e.t}</td>
<td>${diasRestantes(e.t)}</td>
<td>${status(e.t)}</td>
</tr>
`).join("")}
</tbody>
</table>
</div>`;
perfilTela.style.display="block";
}

</script>
</body>
</html>
